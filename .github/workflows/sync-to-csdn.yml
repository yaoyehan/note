name: Sync to CSDN

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync to CSDN
        env:
          CSDN_COOKIE: ${{ secrets.CSDN_COOKIE }}
        run: |
          python3 - << 'PYTHON_SCRIPT'
          import os
          import re
          import requests

          cookie = os.environ.get('CSDN_COOKIE')
          if not cookie:
              print("Error: CSDN_COOKIE not set")
              exit(1)

          print(f"Cookie length: {len(cookie)}")

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Cookie': cookie,
              'Referer': 'https://blog.csdn.net/',
              'Origin': 'https://blog.csdn.net',
              'Accept': 'application/json, text/plain, */*',
              'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
              'X-Requested-With': 'XMLHttpRequest'
          }

          session = requests.Session()
          session.headers.update(headers)

          def get_csrf():
              try:
                  print("Getting CSRF token...")
                  resp = session.get('https://blog.csdn.net/', timeout=30)
                  print(f"Response status: {resp.status_code}")
                  
                  patterns = [
                      r'"csrfToken"\s*:\s*"([^"]+)"',
                      r"csrfToken\s*=\s*'([^']+)'",
                      r'csrf-token"[^>]*content="([^"]+)"',
                      r'csrfToken":"([^"]+)"'
                  ]
                  
                  for pattern in patterns:
                      match = re.search(pattern, resp.text)
                      if match:
                          token = match.group(1)
                          print(f"CSRF token found: {token[:30]}...")
                          return token
                  
                  print("CSRF token not found, trying alternative method...")
                  match = re.search(r'<meta[^>]+name=["\']csrf-token["\'][^>]+content=["\']([^"\']+)["\']', resp.text)
                  if match:
                      print(f"CSRF token from meta tag: {match.group(1)[:30]}...")
                      return match.group(1)
                  
              except Exception as e:
                  print(f"Failed to get CSRF: {e}")
              return None

          csrf_token = get_csrf()
          if not csrf_token:
              print("Warning: Cannot get CSRF token, trying without it...")
              csrf_token = ''

          url = 'https://blog.csdn.net/phoenix/web/v1/article/submit'
          count = 0
          success = 0
          failed = 0

          import glob
          md_files = glob.glob('**/*.md', recursive=True)
          
          for filepath in md_files:
              if '/.obsidian/' in filepath or '/.git/' in filepath:
                  continue
                  
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  title = os.path.splitext(os.path.basename(filepath))[0]
                  if len(content) < 10:
                      print(f"Skipping short file: {title}")
                      continue
                  
                  print(f"\nProcessing: {title}")
                  
                  data = {
                      'title': title,
                      'markdown': content,
                      'content': content,
                      'description': content[:100],
                      'tags': '',
                      'categories': '',
                      'status': 0,
                      'origin': 1
                  }
                  
                  if csrf_token:
                      data['csrfToken'] = csrf_token

                  resp = session.post(url, data=data, timeout=30)
                  print(f"Response status: {resp.status_code}")
                  
                  try:
                      result = resp.json()
                      code = result.get('code')
                      msg = result.get('message', '')
                      
                      if code == 200:
                          print(f"✅ Published: {title}")
                          success += 1
                      elif '未登录' in msg or '登录' in msg or 'login' in msg.lower():
                          print(f"❌ Login failed: {msg}")
                          print("Please update your CSDN cookie")
                          exit(1)
                      elif 'csrf' in msg.lower() or 'token' in msg.lower():
                          print(f"❌ CSRF error: {msg}")
                          csrf_token = get_csrf()
                          if csrf_token:
                              data['csrfToken'] = csrf_token
                              resp = session.post(url, data=data, timeout=30)
                              result = resp.json()
                              if result.get('code') == 200:
                                  print(f"✅ Retry published: {title}")
                                  success += 1
                              else:
                                  print(f"❌ Still failed: {result.get('message')}")
                                  failed += 1
                          else:
                              failed += 1
                      else:
                          print(f"❌ Failed: {msg}")
                          failed += 1
                  except:
                      print(f"Response is not JSON")
                      text = resp.text[:500]
                      print(f"Response text: {text}")
                      if '登录' in text or 'login' in text.lower():
                          print("❌ Not logged in")
                          exit(1)
                      failed += 1
                  
                  count += 1
                  
              except Exception as e:
                  print(f"❌ Error processing {filepath}: {e}")
                  failed += 1

          print(f"\n=== Sync completed: {success} success, {failed} failed, {count} total ===")
          PYTHON_SCRIPT